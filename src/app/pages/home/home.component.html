<h2>Olympic games app</h2>
<hr />
<div>
  <app-header [title]="titlePage" [indicators]="indicators"></app-header>
  <app-chart
    type="pie"
    [labels]="pieChartLabels"
    [data]="pieChartData"
    [backgroundColor]="pieChartBackground"
    (pointClick)="onPiePointClick($event)"
  ></app-chart>
</div>
